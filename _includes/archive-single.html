<style>
  .publications {
    margin-top: 2rem;
  }

  .year-separator {
    font-size: 1.3rem;
    font-weight: bold;
    margin-top: 2rem;
    margin-bottom: 1rem;
    border-bottom: 1px solid #ccc;
    padding-bottom: 0.5rem;
  }

  .publications ul {
    list-style: none;
    padding-left: 0;
  }

  .paper {
    margin-bottom: 1.5rem;
  }

  .paper-title {
    font-weight: bold;
    font-size: 0.8rem;
    display: flex;
    align-items: center;
  }

  .paper-venue {
    display: inline-block;
    background-color: #3f51b5;
    color: #fff;
    padding: 2px 4px;
    border-radius: 2px;
    font-size: 0.6rem;
    margin-right: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
  }

  .paper-authors {
    color: #666;
    font-size: 0.6rem;
    margin-bottom: 0.2rem;
    margin-left: 24px;
  }

  .paper-publication {
    color: #666;
    font-size: 0.9rem;
    font-style: italic;
    margin-bottom: 0.5rem;
    margin-left: 494px;
  }

  .paper-links {
    margin-top: 0.5rem;
    margin-left: 24px;
  }

  .paper-links .btn {
    margin-right: 5.5rem;
  }

  .bibtex.hidden {
    display: none;
  }
</style>

<div class="publications">
  <ul>
      <li>
        <div class="paper">
          <div class="paper-title">
            <span class="paper-venue">{{ post.venue }}</span>
            {{ post.title }}
          </div>
          <div class="paper-authors">{{ post.author }}</div>
          <!-- <div class="paper-publication"><i>{{ post.periodical }}</i>, {{ post.date | date: "%Y" }}</div> -->
          <div class="paper-links">
            {% if post.bibtex %}<a class="bibtex btn btn-sm z-depth-0" role="button">Bib</a>{% endif %}
            {% if post.paperurl %}<a href="{{ post.paperurl }}" class="btn btn-sm z-depth-0" role="button">PDF</a>{% endif %}
            {% if post.code %}<a href="{{ post.paperurl }}" class="btn btn-sm z-depth-0" role="button">Code</a>{% endif %}
          </div>
          {% if post.bibtex %}
            <div class="bibtex hidden">
              <figure class="highlight">
                <pre>{{ post.bibtex }}</pre>
              </figure>
            </div>
          {% endif %}
        </div>
      </li>
      {% assign paper_count = paper_count | plus: 1 %}
  </ul>
</div>
